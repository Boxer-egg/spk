name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          make build package
          echo "Build completed, checking spk.app structure..."
          ls -la
          ls -la spk.app/ || true
          ls -la spk.app/Contents/ || true
          ls -la spk.app/Contents/MacOS/ || true

      - name: Archive
        run: |
          echo "Creating zip archive..."
          zip -r spk.zip spk.app
          echo "Zip file created:"
          unzip -l spk.zip | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: spk.zip
