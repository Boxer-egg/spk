name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write # 需要此权限来创建 releases
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Build and Sign
        run: |
          make all
          echo "Build completed, checking Spk.app structure..."
          ls -la
          ls -la Spk.app/ || true
          ls -la Spk.app/Contents/ || true
          ls -la Spk.app/Contents/MacOS/ || true

      - name: Archive
        run: |
          echo "Creating zip archive..."
          zip -r Spk.zip Spk.app
          echo "Zip file created:"
          unzip -l Spk.zip | head -20

      - name: Check zip file before release
        run: |
          echo "Checking if Spk.zip exists..."
          ls -la Spk.zip
          echo "File size:"
          du -h Spk.zip
          echo "Zip contents:"
          unzip -l Spk.zip | head -30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Spk.zip
          draft: false
          generate_release_notes: true

      - name: Build Complete (Non-tag push)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          echo "Build completed successfully for branch push"
          echo "To create a release, push a tag starting with 'v*'"
          echo "Example: git tag v1.0.0 && git push origin v1.0.0"
